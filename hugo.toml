# Hugo Site Configuration
# Theme: PaperMod via Hugo Modules
baseURL = "https://ejaramillo1.github.io/My-AI-Journey/"
languageCode = "en-us"
title = "My AI Journey"
theme = "PaperMod"

[module]
  [[module.imports]]
    path = "github.com/adityatelange/hugo-PaperMod"

enableEmoji = true

[pagination]
  pagerSize = 10

[params]
  author = "Ed Jaramillo"
  description = "Building AI agents, automating workflows, and learning in public."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/ejaramillo1"
  [[params.socialIcons]]
    name = "linkedin"
    url = "https://linkedin.com/in/ed-jaramillo"

  [params.homeInfoParams]
    Title = "Hi, I'm Ed 👋"
    Content = """
    I'm learning to build AI agents and automate my life — one install at a time.
    This is my public journal.
    """

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

DefaultContentLanguage = "en"

[languages]
  [languages.en]
    languageName = "English"
    contentDir = "content/en"
    weight = 1
    title = "My AI Journey"
    [languages.en.params]
      description = "Building AI agents, automating workflows, and learning in public"

  [languages.es]
    languageName = "Español"
    contentDir = "content/es"
    weight = 2
    title = "My AI Journey"
    [languages.es.params]
      description = "Construyendo agentes de IA, automatizando workflows y aprendiendo en público"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[[menu.main]]
  name = "Blog"
  pageRef = "/posts"
  weight = 10
[[menu.main]]
  name = "About"
  pageRef = "/about"
  weight = 20
